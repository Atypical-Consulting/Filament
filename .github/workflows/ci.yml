name: CI

# Build and test the compiler on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same PR branch; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dotnet:
    name: .NET (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Backstop so a hung restore can't run to the 6-hour default; a cold build+test is ~3 min.
    timeout-minutes: 20
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: '10.0.x'

      # NOT optional, and not obvious: `dotnet test` shells out to `node`. 45 of the 46
      # generator test files run tools/canon.mjs (the alpha-equivalence checker) against the
      # emitted JS via Run.Node() in GateTests.cs, and there is no trait, Skip, or env-var
      # gate on any of them — without node on PATH the whole generator suite fails.
      # canon.mjs also needs esbuild; see the root `npm ci` below.
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/filament-runtime/package-lock.json

      # canon.mjs minifies through `npx --no-install esbuild` resolved from the repo root, so
      # the gate tests need a root node_modules. Without this they fail on any machine whose
      # ~/.npm/_npx cache doesn't already happen to hold esbuild 0.28.1 — which is every clean
      # checkout. The version is pinned exactly because the minified token stream IS what
      # alpha-equivalence is computed over.
      - name: Install root tooling (esbuild, for canon.mjs)
        run: npm ci

      # examples/FilamentApp copies the built runtime into its wwwroot at build time, so the
      # SOLUTION does not compile on a clean checkout until dist/filament.js exists — and
      # src/filament-runtime/dist/ is gitignored, being build output. This is exactly the
      # `npm ci && npm run build` that the csproj's own error message tells you to run.
      - name: Build the signals runtime
        working-directory: src/filament-runtime
        run: npm ci && npm run build

      # The repo has no packages.lock.json, so setup-dotnet's `cache: true` (which requires
      # lock files) cannot be used — cache the global NuGet package folder directly instead.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Filament.sln

      - name: Build
        run: dotnet build Filament.sln --no-restore -c Release

      # The tests locate the repo root by walking up for DECISIONS.md (RepoPaths.Find), so
      # they are cwd-independent but need the full checkout, not just the test binaries.
      # -m:1 runs the three test projects one at a time instead of concurrently. On the Windows
      # runner the generator suite takes ~5 minutes (vs ~30s on macOS) because every one of its
      # gate tests shells out to node, and three testhosts competing for that box made the
      # analyzer host miss vstest's 90s connection handshake — "Test Run Aborted", with every
      # test that did run passing. Sequential costs a couple of minutes and removes the race;
      # the raised timeout is belt-and-braces for a slow-but-not-wedged host.
      - name: Test
        env:
          VSTEST_CONNECTION_TIMEOUT: 180
        run: dotnet test Filament.sln --no-build -c Release -m:1 --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          name: test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  refpack-proof:
    name: Playground ref-pack proof (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/filament-runtime/package-lock.json

      - name: Install root tooling (esbuild, for canon.mjs)
        run: npm ci

      - name: Build the signals runtime
        working-directory: src/filament-runtime
        run: npm ci && npm run build

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-refpack-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # THE EQUIVALENCE PROOF (decision 144): the FULL suite, green, with FILAMENT_DOTNET_ROOT
      # pointed at the curated layout playground/refpack.list describes. This is what stops a
      # renovate SDK bump from silently growing the closure past the list: the playground would
      # ship a broken compiler, and this job fails loud instead.
      - name: Prove the curated ref-pack against the whole suite
        env:
          VSTEST_CONNECTION_TIMEOUT: 180
        run: bash playground/prove-refpack.sh -m:1

  runtime:
    name: Signals runtime (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/filament-runtime
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/filament-runtime/package-lock.json

      - name: Install
        run: npm ci

      # The runtime is the one part of the system the generator does NOT emit — it ships as
      # written, so its own suite is the only thing standing behind it.
      - name: Test
        run: npm test

# NOTE — deliberately NOT in CI:
#
#   bench/  The Playwright measurement harness behind BENCH.md. It needs a real browser plus
#           multi-megabyte Blazor WASM baseline publishes, and every BENCH.md entry records the
#           CPU, thermal state, load average, and Chrome build it was measured on. Re-running it
#           on a shared GitHub runner would produce numbers that contradict the committed
#           evidence while looking equally authoritative — the committed bench/results/*.json
#           are the record, and they are deliberately not gitignored for exactly that reason.
#
#   Coverage gate  The sibling repos (AdrMcp, RoselineMCP) gate on 80% line coverage via
#           coverlet.msbuild. No project here references coverlet, so the flags would collect
#           nothing and the threshold check would fail on a missing report. Add the package
#           first if the gate is wanted.
