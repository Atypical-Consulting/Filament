<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Filament">
  <defs>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf6b"/>
      <stop offset="1" stop-color="#f5920a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f1017"/>
  <!-- the filament: a hot thread that dips and rises like a coiled wire -->
  <path d="M12 40 C 20 40, 22 22, 32 22 C 42 22, 44 40, 52 40"
        fill="none" stroke="url(#wire)" stroke-width="3.5"
        stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="12" cy="40" r="3" fill="#7ff0e6"/>
  <circle cx="52" cy="40" r="3" fill="#7ff0e6"/>
</svg>
