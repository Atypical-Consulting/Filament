<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Filament — live demo</title>
<link rel="icon" href="data:," />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; line-height: 1.5;
         color: #1a1a1a; background: #fafafa; }
  @media (prefers-color-scheme: dark) { body { color: #eaeaea; background: #141414; } }
  header, main, footer { max-width: 60rem; margin: 0 auto;
                         padding-left: clamp(1rem, 5vw, 3rem); padding-right: clamp(1rem, 5vw, 3rem); }
  header { padding-top: 1.5rem; }
  h1 { margin: 0 0 .25rem; font-size: 1.5rem; }
  header p { margin: 0; opacity: .8; font-size: .95rem; }
  [role="tablist"] { display: flex; gap: .25rem; margin: 1rem 0 0;
                     border-bottom: 1px solid rgba(128,128,128,.4); }
  [role="tab"] { appearance: none; border: 0; background: transparent; font: inherit; color: inherit;
                 padding: .5rem .9rem; cursor: pointer; border-radius: .4rem .4rem 0 0;
                 border-bottom: 2px solid transparent; }
  [role="tab"]:hover { background: rgba(128,128,128,.12); }
  [role="tab"][aria-selected="true"] { border-bottom-color: currentColor; font-weight: 600; }
  [role="tab"] .size { display: block; font-size: .72rem; opacity: .65; font-weight: 400; }
  [role="tab"]:focus-visible { outline: 2px solid #4c8bf5; outline-offset: 2px; }
  .frame-wrap { border: 1px solid rgba(128,128,128,.4); border-top: 0;
                border-radius: 0 0 .5rem .5rem; overflow: hidden; background: #fff; }
  @media (prefers-color-scheme: dark) { .frame-wrap { background: #1c1c1c; } }
  iframe { width: 100%; height: 26rem; border: 0; display: block; }
  footer { padding-top: 1rem; padding-bottom: 2rem; font-size: .82rem; opacity: .65; }
  code { font-size: .85em; }
</style>
</head>
<body>
<header>
  <h1>Filament — live demo</h1>
  <p>Each app below runs from JavaScript the compiler emitted from <code>.razor</code>, on a sub-2&nbsp;KB runtime — no framework to boot.</p>
</header>
<main>
  <div role="tablist" aria-label="Demo apps">
    <button role="tab" id="tab-counter" aria-controls="frame" aria-selected="true" data-app="counter">
      Counter <span class="size" data-size="counter">…</span>
    </button>
    <button role="tab" id="tab-rows" aria-controls="frame" aria-selected="false" tabindex="-1" data-app="rows">
      Rows <span class="size" data-size="rows">…</span>
    </button>
    <button role="tab" id="tab-if" aria-controls="frame" aria-selected="false" tabindex="-1" data-app="if">
      If <span class="size" data-size="if">…</span>
    </button>
  </div>
  <div class="frame-wrap">
    <iframe id="frame" title="Selected demo app" src="dist/counter/index.html"></iframe>
  </div>
</main>
<footer>
  Dev build (unminified) for viewing — not a measurement. Weights come from the bench harness.
</footer>
<script>
  const tabs = [...document.querySelectorAll('[role="tab"]')];
  const frame = document.getElementById('frame');

  function select(tab) {
    for (const t of tabs) {
      const on = t === tab;
      t.setAttribute('aria-selected', String(on));
      t.tabIndex = on ? 0 : -1;
    }
    frame.src = 'dist/' + tab.dataset.app + '/index.html';
    tab.focus();
  }

  tabs.forEach((tab, i) => {
    tab.addEventListener('click', () => select(tab));
    tab.addEventListener('keydown', (e) => {
      const last = tabs.length - 1;
      let j = null;
      if (e.key === 'ArrowRight') j = i === last ? 0 : i + 1;
      else if (e.key === 'ArrowLeft') j = i === 0 ? last : i - 1;
      else if (e.key === 'Home') j = 0;
      else if (e.key === 'End') j = last;
      if (j !== null) { e.preventDefault(); select(tabs[j]); }
    });
  });

  // Byte size fetched client-side, so this committed page never encodes a per-build number.
  for (const app of ['counter', 'rows', 'if']) {
    const el = document.querySelector('[data-size="' + app + '"]');
    fetch('dist/' + app + '/app.js')
      .then(r => r.ok ? r.blob() : Promise.reject(r.status))
      .then(b => { if (el) el.textContent = (b.size / 1024).toFixed(1) + ' KB'; })
      .catch(() => { if (el) el.textContent = '— run build.sh'; });
  }
</script>
</body>
</html>
